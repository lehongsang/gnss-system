services:
  postgres:
    container_name: gnss-postgres
    image: ${POSTGIS_IMAGE:-postgis/postgis:17-3.5}
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gnss_system}
      PGUSER: "${POSTGRES_USERNAME:-postgres}"
      PGPASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    networks:
      - datn_gnss
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 5432 -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DB:-gnss_system}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: gnss-redis
    image: redis:8-alpine
    restart: always
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - datn_gnss
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "${REDIS_PASSWORD:-password}" -h localhost -p 6379 ping | grep -q PONG',
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    container_name: gnss-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      S3_ENDPOINT: http://seaweedfs:8333
      KAFKA_HOST: redpanda
      KAFKA_PORT: 29092
      MQTT_HOST: emqx
      MEDIAMTX_API_URL: http://mediamtx:9997
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      mediamtx:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${APP_PORT:-3000}/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - datn_gnss
    volumes:
      - logs:/app/logs

  redpanda:
    container_name: gnss-redpanda
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    env_file:
      - .env
    command:
      - redpanda
      - start
      - --smp
      - "2"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      - --check=false
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "29092:29092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster health --brokers=localhost:29092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - datn_gnss

