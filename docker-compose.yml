  seaweedfs:
    image: chrislusf/seaweedfs:3.59
    container_name: gnss-seaweedfs
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/s3.json <<EOF
        {
          "identities": [
            {
              "name": "$${S3_ACCESS_KEY:-admin}",
              "credentials": [
                {
                  "accessKey": "$${S3_ACCESS_KEY:-admin}",
                  "secretKey": "$${S3_SECRET_KEY:-admin}"
                }
              ],
              "actions": ["Admin", "Read", "Write", "List", "Tagging"]
            }
          ]
        }
        EOF
        weed server -master -volume -filer -s3 -s3.config=/tmp/s3.json
    ports:
      - "9333:9333"
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEDFS_FILER_S3_PORT:-8333}:8333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost:9333/cluster/status || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - seaweedfs_data:/data
    networks:
      - datn_gnss

  emqx:
    image: emqx:5.8
    container_name: gnss-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "8883:8883"
      - "18083:18083"
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-public}
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - emqx_data:/opt/emqx/data
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    networks:
      - datn_gnss

  mediamtx:
    image: ${MEDIAMTX_IMAGE:-bluenviron/mediamtx:latest}
    container_name: gnss-mediamtx
    restart: always
    ports:
      - "${MEDIAMTX_RTSP_PORT:-8554}:8554"
      - "${MEDIAMTX_WEBRTC_PORT:-8889}:8889"
      - "${MEDIAMTX_API_PORT:-9997}:9997"
    environment:
      MTX_API: "yes"
      MTX_WEBRTC: "yes"
      MTX_HLS: "no"
      MTX_RTSP: "yes"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - datn_gnss

  kafka-ui:
    container_name: gnss-kafka-ui
    image: ${KAFKA_UI_IMAGE:-provectuslabs/kafka-ui:latest}
    ports:
      - "${KAFKA_UI_PORT:-8088}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - datn_gnss
    depends_on:
      - redpanda

volumes:
  pgdata:
  redisdata:
  seaweedfs_data:
  logs:
  emqx_data:

networks:
  datn_gnss:
    driver: bridge
