services:
  postgres_db:
    container_name: postgres_db
    image: pgvector/pgvector:pg18
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nest-base}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGUSER: "${POSTGRES_USERNAME:-postgres}"
      PGPASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - nest_base
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10

  redis_db:
    container_name: redis_db
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - nest_base
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis_db:6379
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_db:
        condition: service_healthy
    networks:
      - nest_base

volumes:
  pgdata:
  redisdata:

networks:
  nest_base:
    driver: bridge

